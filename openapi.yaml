openapi: 3.0.3
info:
  title: Tool Foundry Backend V2
  version: 2.0.0
servers:
  - url: /
paths:
  /health:
    get:
      security: []
      responses:
        '200':
          description: Public health state
  /v2/tools:
    get:
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      responses:
        '200':
          description: Registry snapshot
  /v2/tools/{tool_id}/execute:
    post:
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - in: path
          name: tool_id
          required: true
          schema: {type: string}
      responses:
        '200': {description: Tool execution result}
        '409': {description: Tool is not Approved}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
